# H2 in-memory database per i test
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT per i test (minimo 32 caratteri per HS256)
app.jwt.secret=TestSecretKeyForJwtMustBeAtLeast32Chars!!
app.jwt.expiration-ms=3600000

# Mail stub (mocked via @MockBean nei test)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from-name=Test Ristorante
app.base-url=http://localhost:8080
