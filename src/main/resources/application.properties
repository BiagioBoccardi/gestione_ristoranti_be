spring.application.name=gestione_ristoranti
spring.config.import=optional:classpath:application-local.properties
# Configurazione Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gestione_ristorante}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1$i7Aal7}


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=600s
spring.cache.cache-names=piatti,categorie

# QR Code base URL (frontend)
app.base-url=${APP_BASE_URL:http://localhost:5173}

# JWT
app.jwt.secret=${APP_JWT_SECRET:ReplaceThisWithASecretThatIsLongEnoughForHS256SigningKey1234567890}
app.jwt.expiration-ms=86400000
# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ristorantedagiacomo23@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from-name=Giacomo Rossi

# Actuator / Observability
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}