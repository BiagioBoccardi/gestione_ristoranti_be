services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestione_ristorante
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gestione_ristorante"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  backend:
    image: ${DOCKER_HUB_USERNAME}/gestione-ristorante-backend:latest
    build:
      context: .
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gestione_ristorante
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SERVER_PORT: 8080
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: '1.0'

  frontend:
    image: ${DOCKER_HUB_USERNAME}/gestione-ristorante-frontend:latest
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  app_network:
    driver: bridge
